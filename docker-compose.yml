services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: study
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study"]
      interval: 5s
      timeout: 3s
      retries: 10
  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8000"]
  ocsp-signer:
    build: .
    env_file: .env
    command: ["uvicorn", "backend.ocsp_signer:app", "--host", "0.0.0.0", "--port", "8010"]
    expose: ["8010"]
    volumes:
      - ./ocsp-secrets:/run/secrets:ro
  caddy:
    image: caddy:2
    ports: ["443:443", "80:80"]
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    depends_on: [api]
volumes:
  postgres_data:
  chroma_data:
