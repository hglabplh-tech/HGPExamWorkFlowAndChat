name: hgp-exam-work-flow-and-chat

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-study}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study}
      POSTGRES_DB: ${POSTGRES_DB:-study}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study} -d ${POSTGRES_DB:-study}"]
      interval: 5s
      timeout: 3s
      retries: 20

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hgp-exam-work-flow-and-chat:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-study}:${POSTGRES_PASSWORD:-study}@postgres:5432/${POSTGRES_DB:-study}
      CHROMA_URL: http://chroma:8000
      MODEL_OUTPUT_DIR: /models
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - model_data:/models:ro

  trainer:
    image: hgp-exam-work-flow-and-chat:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "backend.training_job"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-study}:${POSTGRES_PASSWORD:-study}@postgres:5432/${POSTGRES_DB:-study}
      CHROMA_URL: http://chroma:8000
      NIGHTLY_TRAINING_MODE: train
      MODEL_OUTPUT_DIR: /models
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_data:/models

  training-scheduler:
    image: hgp-exam-work-flow-and-chat:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "backend.training_scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-study}:${POSTGRES_PASSWORD:-study}@postgres:5432/${POSTGRES_DB:-study}
      CHROMA_URL: http://chroma:8000
      NIGHTLY_TRAINING_MODE: train
      TRAINING_INTERVAL_HOURS: ${TRAINING_INTERVAL_HOURS:-48}
      MODEL_OUTPUT_DIR: /models
    profiles:
      - training
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_data:/models

  ocsp-signer:
    image: hgp-exam-work-flow-and-chat:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "backend.ocsp_signer:app", "--host", "0.0.0.0", "--port", "8010"]
    expose:
      - "8010"
    volumes:
      - ./ocsp-secrets:/run/secrets:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  chroma_data:
  model_data:
  caddy_data:
  caddy_config:
