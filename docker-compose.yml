services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: study
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study"]
      interval: 5s
      timeout: 3s
      retries: 10
  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
  api:
    build: .
    env_file: .env
    environment:
      MODEL_OUTPUT_DIR: /models
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8000"]
    volumes:
      - model_data:/models:ro
  trainer:
    build: .
    env_file: .env
    command: ["python", "-m", "backend.training_job"]
    environment:
      NIGHTLY_TRAINING_MODE: train
      MODEL_OUTPUT_DIR: /models
    profiles: [tools]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_data:/models
  training-scheduler:
    build: .
    env_file: .env
    command: ["python", "-m", "backend.training_scheduler"]
    environment:
      NIGHTLY_TRAINING_MODE: train
      TRAINING_INTERVAL_HOURS: "48"
      MODEL_OUTPUT_DIR: /models
    profiles: [training]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_data:/models
  ocsp-signer:
    build: .
    env_file: .env
    command: ["uvicorn", "backend.ocsp_signer:app", "--host", "0.0.0.0", "--port", "8010"]
    expose: ["8010"]
    volumes:
      - ./ocsp-secrets:/run/secrets:ro
  caddy:
    image: caddy:2
    ports: ["443:443", "80:80"]
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    depends_on: [api]
volumes:
  postgres_data:
  chroma_data:
  model_data:
