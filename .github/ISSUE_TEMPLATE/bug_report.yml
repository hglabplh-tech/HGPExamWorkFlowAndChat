name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include credentials, private keys, student data, or exam evidence.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected behavior and safe reproduction steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, deployment type, operating system, and relevant logs.

