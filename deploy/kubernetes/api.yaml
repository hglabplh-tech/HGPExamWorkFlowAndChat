apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcp-xml-workflow-chat-api
  labels: { app.kubernetes.io/name: hcp-xml-workflow-chat, app.kubernetes.io/component: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: hcp-xml-workflow-chat, app.kubernetes.io/component: api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: hcp-xml-workflow-chat, app.kubernetes.io/component: api }
    spec:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/OWNER/hcp-xml-workflow-chat:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - configMapRef: { name: hcp-xml-workflow-chat }
            - secretRef: { name: hcp-xml-workflow-chat }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "2", memory: 4Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: model-cache, mountPath: /app/.cache }
            - { name: trained-models, mountPath: /models, readOnly: true }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir: {}
        - name: trained-models
          persistentVolumeClaim: { claimName: hcp-xml-workflow-chat-models, readOnly: true }
---
apiVersion: v1
kind: Service
metadata:
  name: hcp-xml-workflow-chat-api
spec:
  selector: { app.kubernetes.io/name: hcp-xml-workflow-chat, app.kubernetes.io/component: api }
  ports:
    - { name: http, port: 80, targetPort: http }
