apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hgp-exam-work-flow-and-chat
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
spec:
  ingressClassName: nginx
  tls:
    - hosts: [study.example.org]
      secretName: hgp-exam-work-flow-and-chat-tls
  rules:
    - host: study.example.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: hgp-exam-work-flow-and-chat-api, port: { name: http } }

